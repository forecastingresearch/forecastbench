<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520">
  <defs>
    <linearGradient id="beamCore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EBC04A"/>
      <stop offset="100%" stop-color="#D8A828"/>
    </linearGradient>
    <linearGradient id="beamMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0B12E" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#E0B12E" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="beamOuter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0B12E" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#E0B12E" stop-opacity="0.02"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.34" cy="0.22" r="0.78">
      <stop offset="0%" stop-color="#F6D880"/>
      <stop offset="48%" stop-color="#E0B12E"/>
      <stop offset="100%" stop-color="#8E6C10"/>
    </radialGradient>
    <linearGradient id="beamFade" x1="0" y1="160" x2="0" y2="484" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="78%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="softBeamBase" maskUnits="userSpaceOnUse" x="279" y="160" width="180" height="324">
      <rect x="279" y="160" width="180" height="324" fill="url(#beamFade)"/>
    </mask>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="112" y="68" width="84" height="410" rx="42" fill="#06152D" transform="rotate(32 154 273)"/>
  </g>

  <g filter="url(#softShadow)">
    <g mask="url(#softBeamBase)">
      <path d="M369 160 L459 454 L279 454 Z" fill="url(#beamOuter)"/>
      <path d="M369 160 L421 454 L317 454 Z" fill="url(#beamMid)"/>
      <path d="M369 160 L390 454 L348 454 Z" fill="url(#beamCore)"/>
    </g>
    <circle cx="369" cy="122" r="32" fill="url(#orb)"/>
  </g>
<script xmlns=""/></svg>